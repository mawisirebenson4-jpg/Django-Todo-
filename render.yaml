services:
  - type: web
    name: django-todo
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn todoproject.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "your-app.onrender.com"
