{% extends 'todos/base.html' %}
{% block title %}Create Todo{% endblock %}
{% block content %}
<h1>Create New Todo</h1>
<form method="post">
 {% csrf_token %}

 {{ form.as_p }}

 <div style="margin-top: 20px;">
 <button type="submit" class="btn btn-primary">Save Todo</button>
 <a href="{% url 'todo_list' %}" class="btn"
 style="background: #ddd; color: #333;">Cancel</a>
 </div>
</form>
{% endblock %}
